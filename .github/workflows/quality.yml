name: Quality Checks

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'test/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'jest.config.js'
              - 'nest-cli.json'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
            e2e:
              - 'e2e/**'
              - 'tests/**'
              - 'playwright*.config.ts'
              - 'scripts/start-*-e2e.sh'
              - '.github/workflows/**'

  backend:
    name: Backend Quality
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build:backend

      - name: Test with coverage
        run: npm run test:cov -- --runInBand

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  frontend:
    name: Frontend Quality
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Bundle size check
        run: npm run check:bundle-size

      - name: Upload build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 3

  integration:
    name: Integration Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API integration tests
        run: npm run test:e2e:api

  e2e:
    name: E2E (Playwright)
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: sgc_itep
          POSTGRES_PASSWORD: sgc_test
          POSTGRES_DB: sgc_itep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USERNAME: sgc_itep
      DATABASE_PASSWORD: sgc_test
      DATABASE_NAME: sgc_itep
      REDIS_URL: redis://127.0.0.1:6379
      E2E_BACKEND_PORT: 3100
      E2E_FRONTEND_PORT: 3101
      NODE_ENV: development
      PORT: 3100

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migration:run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration, e2e]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "backend=${{ needs.backend.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          echo "integration=${{ needs.integration.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          for r in "${{ needs.backend.result }}" "${{ needs.frontend.result }}" "${{ needs.integration.result }}" "${{ needs.e2e.result }}"; do
            if [ "$r" = "failure" ]; then
              echo "One of the required jobs failed."
              exit 1
            fi
          done
          echo "Quality gate passed."
