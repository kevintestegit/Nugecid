x-logging-default: &logging-default
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgc-backend
    env_file: .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=768 --heapsnapshot-signal=SIGUSR2}
      UV_THREADPOOL_SIZE: ${UV_THREADPOOL_SIZE:-8}
      PORT: ${APP_PORT:-3000}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-sgc}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-sgc_password}
      DATABASE_NAME: ${POSTGRES_DB:-sgc}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      ALLOW_MEMORY_SESSION_STORE: ${ALLOW_MEMORY_SESSION_STORE:-false}
    ports:
      - "${HOST_BACKEND_PORT:-8080}:${APP_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
      - ./backups:/app/backups
    mem_limit: ${BACKEND_MEM_LIMIT:-1024m}
    cpus: ${BACKEND_CPUS:-1.50}
    pids_limit: ${BACKEND_PIDS_LIMIT:-256}
    restart: unless-stopped
    logging: *logging-default
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port = process.env.PORT || 3000; require('http').get('http://127.0.0.1:' + port + '/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgc-frontend
    env_file: .env
    environment:
      NODE_ENV: production
      VITE_API_URL: http://localhost:${HOST_BACKEND_PORT:-8080}
    ports:
      - "${HOST_FRONTEND_PORT:-3001}:3001"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *logging-default

  db:
    image: postgres:16
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    logging: *logging-default

  redis:
    image: redis:7-alpine
    container_name: sgc-redis
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          redis-server --appendonly yes
        fi
      '
    env_file: .env
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    logging: *logging-default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "${HOST_ADMINER_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default

volumes:
  pgdata:
  redisdata:
  app_uploads:
