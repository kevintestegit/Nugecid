  # Serviço de Webscraping SEIRN
  webscraping:
    build:
      context: ./webscraping-service
      dockerfile: Dockerfile
    container_name: sgc-webscraping
    ports:
      - "8001:8001"
    environment:
      - SEIRN_BASE_URL=${SEIRN_BASE_URL:-https://seirn.itep.rn.gov.br}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_TTL=3600
      - LOG_LEVEL=INFO
      - HEADLESS=true
      - API_PORT=8001
      - API_HOST=0.0.0.0
    volumes:
      - ./webscraping-service:/app
      - ./webscraping-service/logs:/app/logs
    depends_on:
      - redis
    networks:
      - sgc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
