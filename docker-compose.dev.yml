x-local-defaults: &local-defaults
  POSTGRES_USER: ${POSTGRES_USER:-sgc}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-sgc}
  SESSION_SECURE: ${SESSION_SECURE:-auto}
  STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
  STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-change-me-local-minio}
  OCR_FAIL_OPEN: ${OCR_FAIL_OPEN:-true}
  SEARCH_MEILI_API_KEY: ${SEARCH_MEILI_API_KEY:-change-me-local-search}
  SEARCH_FAIL_OPEN: ${SEARCH_FAIL_OPEN:-true}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-minio}
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-local-search}
  METABASE_APP_PASSWORD: ${METABASE_APP_PASSWORD:-change-me-local-metabase-app}
  METABASE_ANALYTICS_PASSWORD: ${METABASE_ANALYTICS_PASSWORD:-change-me-local-metabase-analytics}

services:
  backend:
    environment:
      <<: *local-defaults

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-minio}

  meilisearch:
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-local-search}

  metabase-bootstrap:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sgc}
      METABASE_APP_PASSWORD: ${METABASE_APP_PASSWORD:-change-me-local-metabase-app}
      METABASE_ANALYTICS_PASSWORD: ${METABASE_ANALYTICS_PASSWORD:-change-me-local-metabase-analytics}

  metabase:
    environment:
      MB_DB_PASS: ${METABASE_APP_PASSWORD:-change-me-local-metabase-app}
